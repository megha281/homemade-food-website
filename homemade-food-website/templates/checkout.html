<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Grandma's Kitchen</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#fffaf3;
color:#333;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:#7b2d26;
color:white;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:500;
}

.navbar a:hover{
text-decoration:underline;
}

/* PAGE CONTAINER */

.container{
max-width:1100px;
margin:120px auto;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
font-family:'Merriweather',serif;
color:#7b2d26;
margin-bottom:30px;
}

/* ORDER SUMMARY */

.order-summary{
background:#f8eee9;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

.order-summary h3{
margin-top:0;
color:#7b2d26;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.item-name{
font-weight:600;
}

.item-details{
font-size:14px;
color:#666;
}

.total{
font-weight:600;
margin-top:10px;
}

/* FORM */

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

input:focus,select:focus{
outline:none;
border-color:#7b2d26;
}

/* BUTTON */

.confirm-btn{
width:100%;
padding:12px;
border:none;
background:#f4a261;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.confirm-btn:hover{
background:#e76f51;
}

/* FOOTER */

.footer{
background:#7b2d26;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

.error{
color:red;
text-align:center;
margin-bottom:15px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div>Grandma's Kitchen</div>

<div>
<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('cart') }}">Cart (<span id="cart-count">0</span>)</a>
</div>

</div>


<div class="container">

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<h2>Checkout</h2>


<!-- ORDER SUMMARY -->

<div class="order-summary">

<h3>Your Order</h3>

<div id="cart-items-list"></div>

<p id="total-items" class="total"></p>

<p id="total-amount" class="total"></p>

</div>


<!-- CHECKOUT FORM -->

<form id="checkout-form" method="POST" action="{{ url_for('checkout') }}">

<input type="hidden" name="cart_data" id="cart-data">
<input type="hidden" name="total_amount" id="total-amount-data">

<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Delivery Address</label>
<input type="text" name="address" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone" name="phone" pattern="[0-9]{10}" required>
</div>

<div class="form-group">
<label>Payment Method</label>

<select name="payment" required>
<option value="cod">Cash on Delivery</option>
<option value="upi">UPI</option>
<option value="card">Credit / Debit Card</option>
</select>

</div>

<button type="submit" class="confirm-btn">Confirm Order</button>

<p id="error-message" class="error"></p>

</form>

</div>


<div class="footer">
<p>© 2026 Grandma's Kitchen | Homemade Pickles & Snacks</p>
</div>


<script>

/* KEEPING YOUR ORIGINAL CHECKOUT LOGIC */

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let totalAmount = 0;

displayCartItems();

function displayCartItems(){

const container=document.getElementById('cart-items-list');
const totalItemsElement=document.getElementById('total-items');
const totalAmountElement=document.getElementById('total-amount');

let html='';
let totalItems=0;

totalAmount=0;

cart.forEach(item=>{

totalItems+=item.qty;

const itemTotal=item.price*item.qty;

totalAmount+=itemTotal;

html+=`
<div class="cart-item">

<div>
<div class="item-name">${item.name}</div>
<div class="item-details">
Qty: ${item.qty} | ₹${item.price}/unit
</div>
</div>

<div>₹${itemTotal}</div>

</div>
`;

});

container.innerHTML=html;

totalItemsElement.textContent=`Total Items: ${totalItems}`;

totalAmountElement.textContent=`Total Amount: ₹${totalAmount}`;

document.getElementById('cart-data').value=JSON.stringify(cart);
document.getElementById('total-amount-data').value=totalAmount;

document.getElementById('cart-count').textContent=totalItems;

}


document.getElementById('checkout-form').addEventListener('submit',function(e){

e.preventDefault();

if(cart.length===0){

document.getElementById('error-message').textContent="Your cart is empty.";

return;

}

const phoneInput=document.getElementById('phone');

if(!/^\d{10}$/.test(phoneInput.value)){

alert("Enter a valid 10 digit phone number");

return;

}

this.submit();

});

</script>

</body>
</html>

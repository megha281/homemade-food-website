<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Cart | Grandma's Kitchen</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#fffaf3;
color:#333;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:#7b2d26;
color:white;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:500;
}

.navbar a:hover{
text-decoration:underline;
}

/* MAIN CONTAINER */

.container{
max-width:1100px;
margin:120px auto;
padding:20px;
}

h1{
text-align:center;
font-family:'Merriweather',serif;
color:#7b2d26;
margin-bottom:40px;
}

/* CART TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th{
background:#7b2d26;
color:white;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#fafafa;
}

/* PRODUCT IMAGE */

.product{
display:flex;
align-items:center;
gap:15px;
}

.product img{
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
}

/* QUANTITY CONTROLS */

.quantity-controls{
display:flex;
align-items:center;
gap:10px;
}

.quantity-btn{
background:#7b2d26;
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
font-size:16px;
}

.quantity-btn:hover{
background:#5f201b;
}

/* REMOVE BUTTON */

.remove-btn{
border:none;
background:none;
color:#d62828;
cursor:pointer;
font-weight:600;
}

.remove-btn:hover{
text-decoration:underline;
}

/* TOTAL SECTION */

.total-section{
text-align:right;
margin-top:30px;
}

.total-amount{
font-size:22px;
font-weight:600;
color:#7b2d26;
margin-bottom:20px;
}

/* CHECKOUT BUTTON */

.checkout-btn{
background:#f4a261;
border:none;
padding:12px 28px;
border-radius:6px;
font-size:16px;
cursor:pointer;
color:white;
text-decoration:none;
}

.checkout-btn:hover{
background:#e76f51;
}

/* FOOTER */

.footer{
background:#7b2d26;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div>Grandma's Kitchen</div>

<div>
<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('cart') }}">Cart (<span id="cart-count">0</span>)</a>
</div>
</div>


<div class="container">

<h1>Your Shopping Cart</h1>

<div id="cart-items"></div>

<div class="total-section">
<div class="total-amount" id="total-amount"></div>

<a href="{{ url_for('checkout') }}" class="checkout-btn">
Proceed to Checkout
</a>
</div>

</div>


<div class="footer">
<p>© 2026 Grandma's Kitchen | Homemade Pickles & Snacks</p>
</div>


<script>

/* --- YOUR ORIGINAL CART LOGIC (UNCHANGED) --- */

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function renderCart(){

const container = document.getElementById('cart-items');
const totalElement = document.getElementById('total-amount');

let html='';
let total=0;

container.innerHTML='';

if(cart.length===0){

html=`<p style="text-align:center;font-size:18px;">Your cart is empty.</p>`;

}else{

html=`<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>
<tbody>`;

cart.forEach(item=>{

const itemTotal=item.price*item.qty;
total+=itemTotal;

html+=`

<tr>

<td>
<div class="product">
<img src="${item.image}">
<div>
${item.name}<br>
<small>${item.weight}</small>
</div>
</div>
</td>

<td>₹${item.price}</td>

<td>
<div class="quantity-controls">
<button onclick="updateQuantity(${item.id},-1)" class="quantity-btn">-</button>
<span>${item.qty}</span>
<button onclick="updateQuantity(${item.id},1)" class="quantity-btn">+</button>
</div>
</td>

<td>₹${itemTotal}</td>

<td>
<button onclick="removeItem(${item.id})" class="remove-btn">Remove</button>
</td>

</tr>
`;

});

html+=`</tbody></table>`;

}

container.innerHTML=html;

totalElement.innerHTML=`Total Amount: ₹${total}`;

updateCartCount();

}

function updateQuantity(itemId,change){

cart=cart.map(item=>{
if(item.id===itemId){
item.qty=Math.max(1,item.qty+change);
}
return item;
});

localStorage.setItem('cart',JSON.stringify(cart));

renderCart();

}

function removeItem(itemId){

cart=cart.filter(item=>item.id!==itemId);

localStorage.setItem('cart',JSON.stringify(cart));

renderCart();

}

function updateCartCount(){

const count=cart.reduce((acc,item)=>acc+item.qty,0);

document.getElementById('cart-count').textContent=count;

}

renderCart();

</script>

</body>
</html>

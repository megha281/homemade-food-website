<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Grandma's Kitchen</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Merriweather:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#fffaf3;
color:#333;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;
background:#7b2d26;
color:white;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:500;
}

.navbar a:hover{
text-decoration:underline;
}

/* PAGE HEADER */

.page-header{
margin-top:100px;
text-align:center;
padding:30px;
}

.page-header h1{
font-family:'Merriweather',serif;
color:#7b2d26;
}

/* CONTACT CONTAINER */

.contact-container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

/* CONTACT INFO */

.contact-info{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-info h3{
color:#7b2d26;
margin-bottom:10px;
}

/* CONTACT FORM */

.contact-form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

input:focus,textarea:focus{
outline:none;
border-color:#7b2d26;
}

/* BUTTON */

button{
background:#f4a261;
border:none;
padding:12px;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#e76f51;
}

/* FOOTER */

.footer{
background:#7b2d26;
color:white;
text-align:center;
padding:20px;
margin-top:50px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div>Grandma's Kitchen</div>

<div>
<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('cart') }}">Cart</a>
</div>

</div>


<!-- HEADER -->

<div class="page-header">
<h1>Contact Us</h1>
<p>We would love to hear from you</p>
</div>


<!-- CONTACT SECTION -->

<div class="contact-container">

<div class="contact-info">

<h3>Our Location</h3>
<p>
123 Spice Street<br>
Hyderabad, Telangana<br>
India
</p>

<h3>Phone</h3>
<p>+91 98765 43210</p>

<h3>Email</h3>
<p>support@grandmaskitchen.com</p>

<h3>Working Hours</h3>
<p>Monday - Saturday<br>9:00 AM – 7:00 PM</p>

</div>


<div class="contact-form">

<form>

<div class="form-group">
<label>Your Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="5" required></textarea>
</div>

<button type="submit">Send Message</button>

</form>

</div>

</div>


<div class="footer">
<p>© 2026 Grandma's Kitchen | Homemade Pickles & Snacks</p>
</div>

</body>
</html>
